name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npx tsx scripts/generate-og.ts
      - run: npx astro build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler-worker.jsonc

      - name: Notify search engines (IndexNow)
        run: |
          test -f dist/sitemap-0.xml
          URLS=$(grep -oP '(?<=<loc>)[^<]+' dist/sitemap-0.xml \
            | sort -u \
            | jq -R . | jq -s .)
          curl -sS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"ouroboros.bot\",
              \"key\": \"11939a2530214da79d49b3a8908b8c9c\",
              \"keyLocation\": \"https://ouroboros.bot/11939a2530214da79d49b3a8908b8c9c.txt\",
              \"urlList\": $URLS
            }"
